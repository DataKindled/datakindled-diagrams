<!DOCTYPE html>

<title>Snowflake Classic Architecture — DataKindled</title>

<body>
<div class="wrap">
<svg viewBox="0 0 680 510" role="img" aria-label="Snowflake classic three-layer architecture — Storage, Compute, and Cloud Services">

<defs>

  </marker>
</defs>

<!-- TITLE -->
<text x="340" y="26" text-anchor="middle" fill="#1A1A1A" font-family="sans-serif" font-size="15" font-weight="500">The Classic Snowflake Architecture</text>
<text x="340" y="46" text-anchor="middle" fill="#888780" font-family="sans-serif" font-size="12">Three independent layers — the foundation established at launch in 2015</text>

<!-- GROUND LINE y=430 -->
<line x1="120" y1="430" x2="580" y2="430" stroke="#444441" stroke-width="1.5" stroke-linecap="round"/>
<text x="350" y="450" text-anchor="middle" fill="#888780" font-family="sans-serif" font-size="11">Cloud infrastructure — AWS · Azure · Google Cloud</text>
<text x="350" y="466" text-anchor="middle" fill="#888780" font-family="sans-serif" font-size="11" opacity="0.6">Single cloud · single region — the original deployment model</text>

<text x="148" y="358" dominant-baseline="central" fill="#0C447C" font-family="sans-serif" font-size="14" font-weight="500">Storage layer</text>
<text x="148" y="378" dominant-baseline="central" fill="#185FA5" font-family="sans-serif" font-size="12">All data stored in compressed, columnar, encrypted format</text>
<text x="148" y="396" dominant-baseline="central" fill="#185FA5" font-family="sans-serif" font-size="12" opacity="0.75">Structured · semi-structured · unstructured · Iceberg</text>
<text x="148" y="414" dominant-baseline="central" fill="#185FA5" font-family="sans-serif" font-size="12" opacity="0.75">Persists independently of compute — always available</text>

<text x="97" y="387" text-anchor="middle" dominant-baseline="central" fill="#888780" font-family="sans-serif" font-size="12">01</text>

<text x="350" y="291" text-anchor="middle" dominant-baseline="central" fill="#888780" font-family="sans-serif" font-size="9" letter-spacing="1.5">INDEPENDENT</text>

<text x="148" y="210" dominant-baseline="central" fill="#993C1D" font-family="sans-serif" font-size="12" opacity="0.75">Scale up or out · pay only for what runs · no downtime</text>

<rect x="258" y="263" width="40" height="22" rx="4" fill="none" stroke="#F0997B" stroke-width="0.5" opacity="0.7"/>
<text x="278" y="274" text-anchor="middle" dominant-baseline="central" fill="#712B13" font-family="sans-serif" font-size="12">GPU</text>
<rect x="306" y="263" width="80" height="22" rx="4" fill="none" stroke="#F0997B" stroke-width="0.5" opacity="0.7"/>
<text x="346" y="274" text-anchor="middle" dominant-baseline="central" fill="#712B13" font-family="sans-serif" font-size="12">Containers</text>

<text x="97" y="229" text-anchor="middle" dominant-baseline="central" fill="#888780" font-family="sans-serif" font-size="12">02</text>

<!-- CONNECTOR 2→3  span=60..146  mid=103 -->

<rect x="282" y="97" width="136" height="16" rx="3" fill="#FAFAF8"/>
<text x="350" y="106" text-anchor="middle" dominant-baseline="central" fill="#888780" font-family="sans-serif" font-size="9" letter-spacing="1.5">INDEPENDENT</text>

<rect x="120" y="60" width="460" height="114" rx="0" fill="#EEEDFE" stroke="#AFA9EC" stroke-width="0.5"/>

<text x="148" y="84" dominant-baseline="central" fill="#3C3489" font-family="sans-serif" font-size="14" font-weight="500">Cloud services layer</text>
<text x="148" y="104" dominant-baseline="central" fill="#534AB7" font-family="sans-serif" font-size="12">Coordinates and governs everything across the platform</text>
<text x="148" y="122" dominant-baseline="central" fill="#534AB7" font-family="sans-serif" font-size="12" opacity="0.75">Auth · metadata · query optimization · governance · security</text>
<text x="148" y="140" dominant-baseline="central" fill="#534AB7" font-family="sans-serif" font-size="12" opacity="0.75">Always on · fully managed · zero administration required</text>
