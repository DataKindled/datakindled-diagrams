<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snowflake Classic Architecture — DataKindled</title>
<style>
body{margin:0;padding:24px;background:#FAFAF8;font-family:sans-serif;display:flex;justify-content:center;align-items:flex-start}
.wrap{width:100%;max-width:720px}
*{box-sizing:border-box;margin:0;padding:0}
svg{width:100%;display:block}
</style>
</head>
<body>
<div class="wrap">
<svg viewBox="0 0 680 496" role="img" aria-label="Snowflake classic three-layer architecture as it existed at launch in 2015 — Storage, Compute, and Cloud Services">

<defs>
  <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
    <path d="M2 2L8 5L2 8" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- TITLE -->
<text x="340" y="22" text-anchor="middle" fill="#1A1A1A" font-family="sans-serif" font-size="15" font-weight="500">The Classic Snowflake Architecture</text>
<text x="340" y="42" text-anchor="middle" fill="#888780" font-family="sans-serif" font-size="12">Three independent layers — established at launch in 2015</text>
<text x="340" y="58" text-anchor="middle" fill="#888780" font-family="sans-serif" font-size="11" opacity="0.6">Single cloud · single region — the original deployment model</text>

<!-- ══ FLOOR 3 — CLOUD SERVICES  y=70  h=114  bottom=184 ══ -->
<rect x="120" y="70" width="460" height="114" rx="0" fill="#EEEDFE" stroke="#AFA9EC" stroke-width="0.5"/>
<line x1="120" y1="70" x2="580" y2="70" stroke="#AFA9EC" stroke-width="0.5" opacity="0.4"/>
<text x="148" y="96" dominant-baseline="central" fill="#3C3489" font-family="sans-serif" font-size="14" font-weight="500">Cloud services layer</text>
<text x="148" y="116" dominant-baseline="central" fill="#534AB7" font-family="sans-serif" font-size="12">Coordinates and governs everything across the platform</text>
<text x="148" y="134" dominant-baseline="central" fill="#534AB7" font-family="sans-serif" font-size="12" opacity="0.75">Auth · metadata · query optimization · governance · security</text>
<text x="148" y="152" dominant-baseline="central" fill="#534AB7" font-family="sans-serif" font-size="12" opacity="0.75">Always on · fully managed · zero administration required</text>
<!-- floor number -->
<rect x="80" y="113" width="34" height="22" rx="4" fill="#FAFAF8" stroke="#D3D1C7" stroke-width="0.5"/>
<text x="97" y="124" text-anchor="middle" dominant-baseline="central" fill="#888780" font-family="sans-serif" font-size="12">03</text>

<!-- CONNECTOR 2→3  span=184..216  mid=200 -->
<line x1="350" y1="188" x2="350" y2="212" stroke="#888780" stroke-width="0.5" marker-end="url(#arr)" marker-start="url(#arr)"/>
<rect x="282" y="192" width="136" height="16" rx="3" fill="#FAFAF8"/>
<text x="350" y="201" text-anchor="middle" dominant-baseline="central" fill="#888780" font-family="sans-serif" font-size="9" letter-spacing="1.5">INDEPENDENT</text>

<!-- ══ FLOOR 2 — COMPUTE  y=216  h=96  bottom=312 ══ -->
<rect x="120" y="216" width="460" height="96" rx="0" fill="#FAECE7" stroke="#F0997B" stroke-width="0.5"/>
<line x1="120" y1="216" x2="580" y2="216" stroke="#F0997B" stroke-width="0.5" opacity="0.4"/>
<text x="148" y="242" dominant-baseline="central" fill="#712B13" font-family="sans-serif" font-size="14" font-weight="500">Compute layer</text>
<text x="148" y="262" dominant-baseline="central" fill="#993C1D" font-family="sans-serif" font-size="12">Virtual warehouses — MPP clusters that execute queries</text>
<text x="148" y="280" dominant-baseline="central" fill="#993C1D" font-family="sans-serif" font-size="12" opacity="0.75">Scale up or out · suspend when idle · pay only when running</text>
<text x="148" y="298" dominant-baseline="central" fill="#993C1D" font-family="sans-serif" font-size="12" opacity="0.75">Standard virtual warehouse compute — CPU based</text>
<!-- floor number -->
<rect x="80" y="259" width="34" height="22" rx="4" fill="#FAFAF8" stroke="#D3D1C7" stroke-width="0.5"/>
<text x="97" y="270" text-anchor="middle" dominant-baseline="central" fill="#888780" font-family="sans-serif" font-size="12">02</text>

<!-- CONNECTOR 1→2  span=312..344  mid=328 -->
<line x1="350" y1="316" x2="350" y2="340" stroke="#888780" stroke-width="0.5" marker-end="url(#arr)" marker-start="url(#arr)"/>
<rect x="282" y="320" width="136" height="16" rx="3" fill="#FAFAF8"/>
<text x="350" y="329" text-anchor="middle" dominant-baseline="central" fill="#888780" font-family="sans-serif" font-size="9" letter-spacing="1.5">INDEPENDENT</text>

<!-- ══ FLOOR 1 — STORAGE  y=344  h=96  bottom=440 ══ -->
<rect x="120" y="344" width="460" height="96" rx="0" fill="#E6F1FB" stroke="#85B7EB" stroke-width="0.5"/>
<line x1="120" y1="344" x2="580" y2="344" stroke="#85B7EB" stroke-width="0.5" opacity="0.4"/>
<text x="148" y="370" dominant-baseline="central" fill="#0C447C" font-family="sans-serif" font-size="14" font-weight="500">Storage layer</text>
<text x="148" y="390" dominant-baseline="central" fill="#185FA5" font-family="sans-serif" font-size="12">All data stored in compressed, columnar, encrypted format</text>
<text x="148" y="408" dominant-baseline="central" fill="#185FA5" font-family="sans-serif" font-size="12" opacity="0.75">Structured · semi-structured · the foundation everything rests on</text>
<!-- floor number -->
<rect x="80" y="387" width="34" height="22" rx="4" fill="#FAFAF8" stroke="#D3D1C7" stroke-width="0.5"/>
<text x="97" y="398" text-anchor="middle" dominant-baseline="central" fill="#888780" font-family="sans-serif" font-size="12">01</text>

<!-- GROUND LINE y=444 -->
<line x1="120" y1="444" x2="580" y2="444" stroke="#444441" stroke-width="1.5" stroke-linecap="round"/>
<text x="350" y="460" text-anchor="middle" fill="#888780" font-family="sans-serif" font-size="11">Cloud infrastructure — AWS at launch · multi-cloud added later</text>

<!-- VERTICAL WALLS -->
<line x1="120" y1="70" x2="120" y2="444" stroke="#444441" stroke-width="1.5" stroke-linecap="round"/>
<line x1="580" y1="70" x2="580" y2="444" stroke="#444441" stroke-width="1.5" stroke-linecap="round"/>

<!-- FOOTER -->
<text x="350" y="482" text-anchor="middle" fill="#888780" font-family="sans-serif" font-size="11" opacity="0.5">Foundational architecture — 2015 · Snowgrid and Cortex AI added from 2022</text>

</svg>
</div>
</body>
</html>
